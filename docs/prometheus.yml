# docs/prometheus.yml
# Prometheus scrape and alerting configuration for Finchippay Solution.
#
# Scrapes the backend /metrics endpoint every 15 seconds and evaluates the
# alerting rules in prometheus-alerts.yml.
#
# When METRICS_TOKEN is set in the backend environment, uncomment the
# `authorization` block below and replace YOUR_METRICS_TOKEN with the
# actual token value:
#
#   authorization:
#     type: "Bearer"
#     credentials: "YOUR_METRICS_TOKEN"
#
# In local development the /metrics endpoint is open by default
# (no token required) so no authorization block is needed.
#
# Mount both files into the Prometheus container:
#
#   volumes:
#     - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
#     - ./docs/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    # Surfaced in alert notifications so one Alertmanager can serve several
    # deployments without an operator having to guess which one paged.
    environment: "production"
    service: "finchippay"

# ─── Alerting rules ───────────────────────────────────────────────────────────
# Path is container-internal — see the volume mounts above.

rule_files:
  - "/etc/prometheus/alerts.yml"

# ─── Alertmanager ─────────────────────────────────────────────────────────────
# Prometheus evaluates the rules; Alertmanager routes the notifications.
# Grafana's own alerting can consume the same metrics instead — see
# docs/grafana-notifiers.yml for the email and Slack channel provisioning.

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "finchippay-backend"
    metrics_path: "/metrics"
    scheme: "http"
    static_configs:
      - targets: ["backend:4000"]
