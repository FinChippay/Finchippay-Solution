# docs/grafana-datasources.yml
# Grafana datasource provisioning for Finchippay Solution.
#
# This file is mounted into the Grafana container at
# /etc/grafana/provisioning/datasources/datasources.yml.
# It configures the Prometheus datasource that the dashboard uses.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false
