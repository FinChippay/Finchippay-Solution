# .github/workflows/ci.yml
# Continuous Integration for Finchippay-Solution
#
# Runs on every push to main/develop and on every pull-request targeting main.
# Seven parallel jobs:
#   1. frontend          — lint, i18n, type-check, unit tests, build
#   2. visual-regression — Chromatic Storybook visual regression
#   3. backend           — format check, lint, unit tests
#   4. contracts         — cargo check, cargo test, WASM build
#   5. compose           — validate Docker Compose configurations
#   6. e2e               — Playwright end-to-end tests
#   7. validate          — validate environment and config files

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL for load tests (default: http://localhost:4000)'
        required: false
        default: 'http://localhost:4000'

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]

    # Node 24 is a canary — shows compatibility issues but never blocks PRs
    continue-on-error: ${{ matrix.node-version != '22' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: i18n check
        run: npm run i18n:check

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build Storybook
        run: npm run build-storybook

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ─── Storybook Visual Regression ───────────────────────────────────────────
  visual-regression:
    name: Storybook Visual Regression (Chromatic)
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Chromatic visual tests
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: frontend
          exitZeroOnChanges: false
          autoAcceptChanges: main

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]

    # Node 24 is a canary — shows compatibility issues but never block PRs
    continue-on-error: ${{ matrix.node-version != '22' }}

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration
        env:
          ANTHROPIC_API_KEY: test-key-for-ci

  # ─── Contracts ─────────────────────────────────────────────────────────────
  contracts:
    name: Soroban Contracts (Rust ${{ matrix.rust-channel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust-channel: ["stable", "nightly"]

    # Nightly is a canary — shows future compiler issues but never blocks PRs
    continue-on-error: ${{ matrix.rust-channel == 'nightly' }}

    defaults:
      run:
        working-directory: contracts/finchippay-contract

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust-channel }}
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/finchippay-contract/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust-channel }}-${{ hashFiles('contracts/finchippay-contract/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit

      - name: Check
        run: cargo check --target wasm32v1-none

      - name: Test
        run: cargo test

      - name: Build WASM
        # Only build WASM on stable to avoid duplicate artifacts
        if: ${{ matrix.rust-channel == 'stable' }}
        run: cargo build --target wasm32v1-none --release

  # ─── Docker Compose Validation ──────────────────────────────────────────────
  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml (dev)
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.prod.yml (production)
        run: docker compose -f docker-compose.prod.yml config --quiet

  # ─── E2E Tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          npm ci
          npm start &
          for i in $(seq 1 30); do
            curl -s http://localhost:4000/health && break
            [ "$i" -eq 30 ] && echo "Backend failed to start" && exit 1
            sleep 1
          done
        env:
          PORT: 4000
          NODE_ENV: test
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org
          JWT_SECRET: test-secret-for-e2e-testing-only
          ALLOWED_ORIGINS: "*"
          ANTHROPIC_API_KEY: test-key-for-ci

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

# --- Lighthouse -----------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npx lhci autorun

  # ─── Load Tests (k6) — manual trigger only ─────────────────────────────────
  load-test:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    # Manual trigger only — load tests are expensive and should not block PRs.
    # Run against staging by setting BASE_URL in the workflow dispatch inputs.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend
        working-directory: backend
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && echo "Backend ready" && break
            [ "$i" -eq 30 ] && echo "Backend failed to start" && exit 1
            sleep 1
          done
        env:
          PORT: 4000
          NODE_ENV: test
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org
          JWT_SECRET: test-secret-for-load-testing-only
          ALLOWED_ORIGINS: "*"
          ANTHROPIC_API_KEY: test-key-for-ci

      - name: Create results directory
        run: mkdir -p k6-results

      - name: Run dashboard-traffic scenario
        run: |
          k6 run \
            --env BASE_URL=http://localhost:4000 \
            --out json=k6-results/dashboard-traffic.json \
            tests/load/dashboard-traffic.js
        continue-on-error: true

      - name: Run payment-burst scenario
        run: |
          k6 run \
            --env BASE_URL=http://localhost:4000 \
            --out json=k6-results/payment-burst.json \
            tests/load/payment-burst.js
        continue-on-error: true

      - name: Run analytics-query scenario
        run: |
          k6 run \
            --env BASE_URL=http://localhost:4000 \
            --out json=k6-results/analytics-query.json \
            tests/load/analytics-query.js
        continue-on-error: true

      - name: Run sustained-load scenario
        run: |
          k6 run \
            --env BASE_URL=http://localhost:4000 \
            --out json=k6-results/sustained-load.json \
            tests/load/sustained-load.js
        continue-on-error: true

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-results/
          retention-days: 30

  # --- Validate Config -------------------------------------------------------
  validate:
    name: Validate Config & Env
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required config files exist
        run: |
          MISSING=0
          for file in backend/.env.example frontend/.env.example .nvmrc sdk/package.json scripts/generate-sdk.sh; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              MISSING=1
            else
              echo "✅ Found: $file"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then exit 1; fi

      - name: Validate root package.json
        run: |
          if [ -f package.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))" && echo "✅ package.json is valid JSON"
          fi

      - name: Check for hardcoded secrets
        run: |
          # Exclude GitHub workflow files and test fixtures from secret scanning
          if grep -rE "sk-[a-zA-Z0-9]{32,}" \
            --include="*.{js,ts,json}" \
            --exclude-dir=.github \
            --exclude-dir=node_modules \
            --exclude-dir=__tests__ \
            --exclude-dir=e2e \
            . 2>/dev/null; then
            echo "⚠️  WARNING: Potential hardcoded API keys found above. Review before merging."
          else
            echo "✅ No suspicious hardcoded secrets detected"
          fi
