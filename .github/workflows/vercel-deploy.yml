# .github/workflows/vercel-deploy.yml
# Deploy frontend to Vercel on push to main and PR previews.
#
# Setup:
#   1. Install Vercel CLI: npm i -g vercel
#   2. Link project: vercel link
#   3. Add secrets to GitHub:
#      - VERCEL_TOKEN        (from https://vercel.com/account/tokens)
#      - VERCEL_ORG_ID       (from .vercel/project.json)
#      - VERCEL_PROJECT_ID   (from .vercel/project.json)
#
# This workflow deploys:
#   - Production on push to main
#   - Preview on pull requests (comment with preview URL)

name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.19.5'
  CANARY_TRAFFIC_PERCENT: 10
  CANARY_MONITOR_MINUTES: 15
  SENTRY_ERROR_THRESHOLD: 50

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: "preview"

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        working-directory: frontend
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Preview to Vercel
        id: deploy
        working-directory: frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with Preview URL
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## 🚀 Vercel Preview Deployed

            **Preview URL:** ${{ steps.deploy.outputs.preview_url }}

            > This preview will update automatically on new commits.
          comment-tag: vercel-preview

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: "production"
      url: https://finchippay.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        working-directory: frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel Preview (Canary)
        id: canary-deploy
        working-directory: frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "canary_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Enable Canary Traffic Routing
        working-directory: frontend
        run: |
          vercel alias set ${{ steps.canary-deploy.outputs.canary_url }} canary-${{ github.sha }}.finchippay.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Wait for Canary Deployment
        run: echo "Canary deployment active at 10% traffic. Monitoring for ${{ env.CANARY_MONITOR_MINUTES }} minutes."

      - name: Monitor Error Rate During Canary
        working-directory: scripts
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          CANARY_DEPLOYMENT_URL: ${{ steps.canary-deploy.outputs.canary_url }}
        run: node canary-check.js

      - name: Promote Canary to Production
        if: success()
        working-directory: frontend
        run: |
          vercel promote ${{ steps.canary-deploy.outputs.canary_url }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Cleanup Canary Alias
        if: always()
        working-directory: frontend
        run: |
          vercel alias rm canary-${{ github.sha }}.finchippay.vercel.app --token=${{ secrets.VERCEL_TOKEN }} || true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Update GitHub Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              environment: 'production',
              required_contexts: [],
              description: 'Canary deployment processed'
            });
            const jobStatus = '${{ job.status }}';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: jobStatus === 'success' ? 'success' : (jobStatus === 'cancelled' ? 'failure' : 'failure'),
              environment_url: 'https://finchippay.vercel.app',
              description: jobStatus === 'success' ? 'Canary deployment promoted to production' : 'Canary deployment failed'
            });
