services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - PORT=4000
      - NODE_ENV=production
      - STELLAR_NETWORK=mainnet
      - HORIZON_URL=https://horizon.stellar.org
      - TURRETS_EVALUATION_INTERVAL_MS=60000
      # Optional: set to enable distributed tracing via OTLP
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      # Optional: set to enable AI payment parsing via Anthropic
      # - ANTHROPIC_API_KEY=sk-ant-xxxxxxxxxxxxx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  # ─── Jaeger all-in-one (production distributed tracing) ──────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.64
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

volumes:
  jaeger_data:
